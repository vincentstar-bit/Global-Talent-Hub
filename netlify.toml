[build]
  command = "pnpm install && pnpm --filter @workspace/company-site run build"
  publish = "artifacts/company-site/dist/public"

[build.environment]
  NODE_VERSION = "20"

# Proxy all /api/* calls to the Railway backend
# After deploying to Railway, set RAILWAY_BACKEND_URL in Netlify:
# Site settings → Environment variables → RAILWAY_BACKEND_URL = https://your-app.railway.app
[[redirects]]
  from = "/api/*"
  to = "https://your-app.railway.app/api/:splat"
  status = 200
  force = true

# SPA fallback — must come LAST
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
