kind = "web"
previewPath = "/"
title = "Company Website"
version = "1.0.0"
id = "artifacts/company-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23831

[services.development]
run = "pnpm --filter @workspace/company-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/company-site", "run", "build" ]
publicDir = "artifacts/company-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23831"
BASE_PATH = "/"
